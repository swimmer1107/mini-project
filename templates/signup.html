{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg mt-10">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-gray-800">Create an Account</h2>
        <p class="text-gray-500 mt-2">Join the Smart Agriculture platform</p>
    </div>
    
    <form method="POST" action="{{ url_for('auth.signup') }}" class="space-y-5">
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" id="username" name="username" required 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition">
        </div>

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
            <input type="email" id="email" name="email" required 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition">
        </div>
        
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" name="password" required 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition">
        </div>
        
        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2.5 rounded-lg transition duration-200">
            Sign Up
        </button>
    </form>
    
    <div class="mt-6 text-center text-sm text-gray-600">
        Already have an account? <a href="{{ url_for('auth.login') }}" class="text-green-600 hover:text-green-700 font-medium hover:underline">Log in</a>
    </div>
</div>
{% endblock %}
