{% extends "base.html" %}

{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-8">
    <div class="flex flex-col items-center justify-center text-center">
        <!-- Avatar -->
        <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-4xl font-bold uppercase shadow-inner">
            {{ user.username[0] }}
        </div>
        
        <h2 class="text-3xl font-bold text-gray-800 mt-4">{{ user.username }}</h2>
        <p class="text-gray-500">{{ user.email }}</p>
        
        <div class="mt-8 border-t border-gray-100 w-full pt-8 px-4 grid grid-cols-2 gap-4 divide-x divide-gray-100">
            <div>
                <p class="text-gray-500 text-sm uppercase tracking-wider mb-1">Total Predictions</p>
                <p class="text-3xl font-extrabold text-green-600">{{ total_predictions }}</p>
            </div>
            <div>
                <p class="text-gray-500 text-sm uppercase tracking-wider mb-1">Account Status</p>
                <div class="inline-flex items-center px-3 py-1 mt-1 rounded-full text-sm font-medium bg-green-100 text-green-800">
                    Active
                </div>
            </div>
        </div>
        
        <div class="mt-10 w-full flex justify-center space-x-4">
            <a href="{{ url_for('main.dashboard') }}" class="bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold py-2 px-6 rounded-lg transition">
                Back to Dashboard
            </a>
            <a href="{{ url_for('auth.logout') }}" class="bg-red-50 text-red-600 hover:bg-red-100 font-semibold py-2 px-6 rounded-lg transition">
                Logout
            </a>
        </div>
    </div>
</div>
{% endblock %}
