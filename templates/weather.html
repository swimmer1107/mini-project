{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 mb-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Real-Time Weather</h2>
        <form method="POST" action="{{ url_for('main.weather') }}" class="flex gap-4">
            <input type="text" name="city" placeholder="Search by city (e.g., Mathura)" value="{{ city }}" required 
                   class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition">
                Search
            </button>
        </form>
    </div>

    {% if weather %}
    <div class="bg-gradient-to-br from-blue-500 to-blue-700 rounded-xl shadow-lg p-8 text-white relative overflow-hidden">
        <!-- Decoration -->
        <svg class="absolute -right-10 -top-10 w-48 h-48 text-white opacity-10" fill="currentColor" viewBox="0 0 20 20"><path d="M17.5 11.6L16 10.5l1.5-1.1c.3-.2.4-.6.2-.9l-1.5-2.6c-.2-.3-.6-.4-.9-.2l-1.5 1.1-1.5-1.1c-.2-.1-.3-.4-.5-.6L11.5 3c0-.3-.4-.5-.7-.5H8.2c-.3 0-.6.2-.7.5l-.3 2.1c-.2.2-.3.5-.5.6l-1.5 1.1-1.5-1.1c-.3-.2-.7-.1-.9.2l-1.5 2.6c-.2.3-.1.7.2.9l1.5 1.1-1.5 1.1c-.3.2-.4.6-.2.9l1.5 2.6c.2.3.6.4.9.2l1.5-1.1 1.5 1.1c.2.1.3.4.5.6l.3 2.1c0 .3.4.5.7.5h2.6c.3 0 .6-.2.7-.5l.3-2.1c.2-.2.3-.5.5-.6l1.5-1.1 1.5 1.1c.3.2.7.1.9-.2l1.5-2.6c.2-.3.1-.7-.2-.9z"/></svg>

        <div class="relative z-10 flex flex-col md:flex-row items-center justify-between">
            <div class="text-center md:text-left mb-6 md:mb-0">
                <h3 class="text-4xl font-bold">{{ city }}</h3>
                <p class="text-blue-100 mt-1 capitalize">{{ weather.description }}</p>
                <div class="text-6xl font-extrabold mt-4">
                    {{ weather.temp }}°C
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 text-center md:text-left">
                <div class="bg-white/20 rounded-lg p-4 backdrop-blur-sm">
                    <p class="text-blue-100 text-sm">Humidity</p>
                    <p class="text-xl font-bold">{{ weather.humidity }}%</p>
                </div>
                <div class="bg-white/20 rounded-lg p-4 backdrop-blur-sm">
                    <p class="text-blue-100 text-sm">Rainfall</p>
                    <p class="text-xl font-bold">{{ weather.rainfall }} mm</p>
                </div>
            </div>
        </div>
    </div>
    {% endif %}
</div>
{% endblock %}
